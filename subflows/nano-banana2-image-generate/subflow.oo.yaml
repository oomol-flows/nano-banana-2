inputs_def:
  - handle: prompt
    description: "%text-description-of-the-desired-image-be-specific-about-style-su2%"
    json_schema:
      type: string
      ui:widget: text
    nullable: false

  - handle: image_urls
    description: "%optional-reference-image-urls-1-14-for-image-to-image-transforma2%"
    json_schema:
      type: array
      items:
        type: string
        minLength: 1
        format: uri
      minItems: 1
      maxItems: 14
    value:
    nullable: true
  - handle: num_images
    description: "%number-of-images-to-generate-per-prompt-range-1-4-default-is-12%"
    json_schema:
      type: integer
      minimum: 1
      maximum: 4
      default: 1
    value: 1
    nullable: true

  - handle: aspect_ratio
    description: "%output-image-aspect-ratio-options-auto-21-9-16-9-3-2-4-3-5-4-1-12%"
    json_schema:
      type: string
      enum:
        - auto
        - 21:9
        - 16:9
        - 3:2
        - 4:3
        - 5:4
        - 1:1
        - 4:5
        - 3:4
        - 2:3
        - 9:16
      default: auto
      ui:options:
        labels:
          - Auto
          - 21:9
          - 16:9
          - 3:2
          - 4:3
          - 5:4
          - 1:1
          - 4:5
          - 3:4
          - 2:3
          - 9:16
    value: auto
    nullable: true

  - handle: output_format
    description: "%output-image-format-options-jpeg-png-webp-default-is-png2%"
    json_schema:
      type: string
      enum:
        - jpeg
        - png
        - webp
      default: png
      ui:options:
        labels:
          - JPEG
          - PNG
          - WebP
    value: png
    nullable: true

  - handle: resolution
    description: "%output-resolution-options-0-5k-fast-preview-1k-default-2k-4k-hig2%"
    json_schema:
      type: string
      enum:
        - 0.5K
        - 1K
        - 2K
        - 4K
      default: 1K
      ui:options:
        labels:
          - 0.5K
          - 1K
          - 2K
          - 4K
    value: 1K
    nullable: true

  - handle: seed
    description: "%optional-random-seed-for-reproducible-results-same-seed-same-pro2%"
    json_schema:
      type: integer
    value:
    nullable: true
  - handle: safety_tolerance
    description: "%content-safety-level-1-strictest-to-6-most-permissive-default-is2%"
    json_schema:
      type: string
      enum:
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"
        - "6"
      default: "4"
      ui:options:
        labels:
          - 1 (Strictest)
          - "2"
          - "3"
          - "4"
          - "5"
          - 6 (Most Permissive)
    value: "4"
    nullable: true

  - handle: limit_generations
    description: "%limit-to-single-generation-per-prompt-default-is-true2%"
    json_schema:
      type: boolean
      default: true
    value: true
    nullable: true

  - handle: enable_web_search
    description: "%enable-web-search-to-enhance-generation-with-real-world-referenc2%"
    json_schema:
      type: boolean
    value:
    nullable: true
outputs_def:
  - handle: file_paths
    description: "%array-of-local-file-paths-where-downloaded-images-are-saved-use%"
    json_schema:
      type: array
      items:
        type: string
        ui:widget: file
    nullable: false

outputs_from:
  - handle: file_paths
    from_node:
      - node_id: map#1
        output_handle: array

nodes:
  - node_id: map#1
    title: "%map-1%"
    inputs_from:
      - handle: array
        from_node:
          - node_id: nano-banana2-generation#1
            output_handle: image_urls
    subflow: array::map
    slots:
      - slot_node_id: +slot#2
        slotflow: self::+slotflow#1
  - node_id: nano-banana2-generation#1
    title: "Nano Banana2 Image Generation #1"
    inputs_from:
      - handle: prompt
        from_flow:
          - input_handle: prompt
      - handle: image_urls
        from_flow:
          - input_handle: image_urls
      - handle: num_images
        value: 1
        from_flow:
          - input_handle: num_images
      - handle: aspect_ratio
        value: auto
        from_flow:
          - input_handle: aspect_ratio
      - handle: output_format
        value: png
        from_flow:
          - input_handle: output_format
      - handle: resolution
        value: 1K
        from_flow:
          - input_handle: resolution
      - handle: seed
        from_flow:
          - input_handle: seed
      - handle: safety_tolerance
        value: "4"
        from_flow:
          - input_handle: safety_tolerance
      - handle: limit_generations
        value: true
        from_flow:
          - input_handle: limit_generations
      - handle: enable_web_search
        from_flow:
          - input_handle: enable_web_search
    task: self::nano-banana2-generation

title: "%nano-banana2-download%"
icon: ":carbon:download:"
description: "%generate-ai-images-from-text-prompts-and-automatically-download%"
