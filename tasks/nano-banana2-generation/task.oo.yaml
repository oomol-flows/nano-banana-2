inputs_def:
  - handle: prompt
    description: "%text-description-of-the-desired-image-be-specific-about-style-su%"
    json_schema:
      type: string
      ui:widget: text
    nullable: false

  - handle: image_urls
    description: "%optional-reference-image-urls-1-14-for-image-to-image-transforma%"
    json_schema:
      type: array
      items:
        type: string
        minLength: 1
        format: uri
      minItems: 1
      maxItems: 14
    nullable: true

  - group: Generation Settings
    collapsed: true

  - handle: num_images
    description: "%number-of-images-to-generate-per-prompt-range-1-4-default-is-1%"
    json_schema:
      type: integer
      minimum: 1
      maximum: 4
      default: 1
    value: 1
    nullable: true

  - handle: aspect_ratio
    description: "%output-image-aspect-ratio-options-auto-21-9-16-9-3-2-4-3-5-4-1-1%"
    json_schema:
      type: string
      enum:
        - auto
        - 21:9
        - 16:9
        - 3:2
        - 4:3
        - 5:4
        - 1:1
        - 4:5
        - 3:4
        - 2:3
        - 9:16
      default: auto
      ui:options:
        labels:
          - Auto
          - 21:9
          - 16:9
          - 3:2
          - 4:3
          - 5:4
          - 1:1
          - 4:5
          - 3:4
          - 2:3
          - 9:16
    value: auto
    nullable: true

  - handle: output_format
    description: "%output-image-format-options-jpeg-png-webp-default-is-png%"
    json_schema:
      type: string
      enum:
        - jpeg
        - png
        - webp
      default: png
      ui:options:
        labels:
          - JPEG
          - PNG
          - WebP
    value: png
    nullable: true

  - handle: resolution
    description: "%output-resolution-options-0-5k-fast-preview-1k-default-2k-4k-hig%"
    json_schema:
      type: string
      enum:
        - 0.5K
        - 1K
        - 2K
        - 4K
      default: 1K
      ui:options:
        labels:
          - 0.5K
          - 1K
          - 2K
          - 4K
    value: 1K
    nullable: true

  - handle: seed
    description: "%optional-random-seed-for-reproducible-results-same-seed-same-pro%"
    json_schema:
      type: integer
    nullable: true

  - group: Advanced Options
    collapsed: true

  - handle: safety_tolerance
    description: "%content-safety-level-1-strictest-to-6-most-permissive-default-is%"
    json_schema:
      type: string
      enum:
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"
        - "6"
      default: "4"
      ui:options:
        labels:
          - 1 (Strictest)
          - "2"
          - "3"
          - "4"
          - "5"
          - 6 (Most Permissive)
    value: "4"
    nullable: true

  - handle: limit_generations
    description: "%limit-to-single-generation-per-prompt-default-is-true%"
    json_schema:
      type: boolean
      default: true
    value: true
    nullable: true

  - handle: enable_web_search
    description: "%enable-web-search-to-enhance-generation-with-real-world-referenc%"
    json_schema:
      type: boolean
    nullable: true

outputs_def:
  - handle: image_urls
    description: "%array-of-generated-image-urls-use-these-urls-to-download-or-disp%"
    json_schema:
      type: array
      items:
        type: string
    nullable: false

  - handle: images
    description: "%array-of-image-metadata-objects-containing-url-dimensions-width%"
    json_schema:
      type: array
      items:
        type: object
        properties:
          url:
            type: string
          width:
            type: integer
            nullable: true
          height:
            type: integer
            nullable: true
          file_name:
            type: string
          file_size:
            type: integer
            nullable: true
          content_type:
            type: string
    nullable: false

executor:
  name: python
  options:
    entry: __init__.py
title: "%nano-banana2-image-generation%"
icon: ":carbon:image:"
description: "%generate-ai-images-from-text-prompts-supports-image-to-image-edi%"
private: true
